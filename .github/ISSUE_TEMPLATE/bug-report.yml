name: Bug report
description: Report a site bug or regression.
title: "[Bug] "
labels: ["frontend"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please complete all fields."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: Briefly describe the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to...
        2. Click...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page or URL
      description: Which page is affected? (e.g. /gallery/, /cohorts/year-4.html)
      placeholder: /gallery/
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser / device
      description: What were you using when you saw this? Include OS if relevant.
      placeholder: e.g. Chrome 126 on macOS, Safari on iPhone 15
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Attach visuals if available.
  - type: dropdown
    id: a11y
    attributes:
      label: Accessibility impact
      description: Does this affect keyboard navigation, screen readers, or contrast?
      options:
        - None known
        - Minor
        - Major
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How much does this block users or contributors?
      options:
        - Low (cosmetic)
        - Medium (annoying but workable)
        - High (broken/blocking)
    validations:
      required: true
